name: Google Play Developer
description: >-
  The Google Play Developer API allows developers to perform publishing and
  app-management tasks for Android applications. It includes the Publishing API
  for uploading and distributing apps, and the Subscriptions and In-App Purchases
  API for managing in-app products, subscriptions, and purchase verification.
