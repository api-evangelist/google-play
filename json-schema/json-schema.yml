$schema: https://json-schema.org/draft/2020-12/schema
$id: https://raw.githubusercontent.com/api-evangelist/google-play/refs/heads/main/json-schema/json-schema.yml
title: Google Play Developer API Schema
description: >-
  JSON Schema for the Google Play Developer API covering app edits, in-app
  products, and purchase resources.
type: object
properties:
  AppEdit:
    type: object
    properties:
      id:
        type: string
        description: The unique identifier of the edit.
      expiryTimeSeconds:
        type: string
        description: The time at which the edit will expire and be deleted.
    required:
      - id
  InAppProduct:
    type: object
    properties:
      packageName:
        type: string
        description: The package name of the parent app.
      sku:
        type: string
        description: The stock-keeping unit of the product.
      status:
        type: string
        description: The status of the product.
        enum:
          - statusUnspecified
          - active
          - inactive
      purchaseType:
        type: string
        description: The type of purchase.
        enum:
          - managedUser
          - subscription
      defaultPrice:
        type: object
        properties:
          priceMicros:
            type: string
          currency:
            type: string
    required:
      - packageName
      - sku
  ProductPurchase:
    type: object
    properties:
      purchaseState:
        type: integer
        description: The purchase state (0 purchased, 1 canceled, 2 pending).
      consumptionState:
        type: integer
        description: The consumption state (0 not consumed, 1 consumed).
      orderId:
        type: string
        description: The order ID associated with the purchase.
      purchaseTimeMillis:
        type: string
        description: The time the product was purchased in milliseconds.
      regionCode:
        type: string
        description: ISO 3166-1 alpha-2 billing region code.
    required:
      - purchaseState
      - orderId
  SubscriptionPurchaseV2:
    type: object
    properties:
      kind:
        type: string
      regionCode:
        type: string
      latestOrderId:
        type: string
      lineItems:
        type: array
        items:
          type: object
          properties:
            productId:
              type: string
            expiryTime:
              type: string
              format: date-time
